<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Typhoon OCR Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Noto+Sans+Thai:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <main class="app">
    <header class="hero">
      <h1 class="title">Typhoon OCR Studio</h1>
      <p class="subtitle">Upload an image and get clean OCR text instantly.</p>
    </header>

    <section class="grid">
      <article class="card">
        <div class="card-head">
          <h2 class="card-title">Upload Image</h2>
          <span class="hint">JPG, PNG, WEBP, Camera</span>
        </div>

        <div class="file-box">
          <input type="file" id="imageInput" accept="image/*">
          <input type="file" id="cameraInput" class="camera-input-hidden" accept="image/*" capture="environment">
          <div class="actions">
            <button id="cameraButton" type="button" class="btn btn-camera">Take Photo</button>
            <button id="ocrButton" type="button" class="btn btn-primary" disabled>Start OCR</button>
          </div>
        </div>

        <img id="preview" alt="Preview">
      </article>

      <article class="card">
        <div class="card-head">
          <h2 class="card-title">Text Output</h2>
          <span class="hint">Formatted Result</span>
        </div>

        <div id="progress" class="progress">
          <div class="progress-meta">
            <span id="progressPercent">0%</span>
            <span id="progressEta">Preparing...</span>
          </div>
          <div class="progress-track">
            <div id="progressFill" class="progress-fill"></div>
          </div>
        </div>

        <pre id="output">Waiting for image upload...</pre>
      </article>
    </section>
  </main>

  <div id="cameraModal" class="camera-modal">
    <div class="camera-card">
      <video id="cameraVideo" autoplay playsinline muted></video>
      <div class="camera-actions">
        <button id="captureButton" type="button" class="btn btn-primary">Capture</button>
        <button id="closeCameraButton" type="button" class="btn btn-camera">Cancel</button>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
