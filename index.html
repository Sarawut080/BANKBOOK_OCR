<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCR by Typhoon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f7f7f7;
        }
        .box {
            background: #fff;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            height: 85vh;
            overflow-y: auto;
        }
        #preview {
            width: 100%;
            border-radius: 10px;
            margin-top: 10px;
            display: none;
        }
        #output {
            white-space: pre-wrap;
            font-size: 15px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container-fluid p-4">
        <h3 class="mb-4 text-center">ระบบถอดข้อความจากภาพด้วย Typhoon OCR</h3>

        <div class="row g-4">
            <div class="col-md-6">
                <div class="box">
                    <h5>อัปโหลดรูปภาพ</h5>
                    <input type="file" id="imageInput" class="form-control" accept="image/*">
                    <button id="ocrButton" class="btn btn-primary mt-3" disabled>ถอดข้อความจากภาพ</button>
                    <img id="preview" alt="Preview Image">
                </div>
            </div>

            <div class="col-md-6">
                <div class="box">
                    <h5>ผลลัพธ์ข้อความ</h5>
                    <pre id="output">รออัปโหลดภาพ...</pre>
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedFile = null;

        document.getElementById("imageInput").addEventListener("change", (e) => {
            selectedFile = e.target.files[0];
            if (!selectedFile) {
                return;
            }

            const preview = document.getElementById("preview");
            preview.src = URL.createObjectURL(selectedFile);
            preview.style.display = "block";

            document.getElementById("output").textContent =
                "ภาพถูกโหลดแล้ว สามารถกดปุ่ม 'ถอดข้อความจากภาพ' ได้เลย";
            document.getElementById("ocrButton").disabled = false;
        });

        document.getElementById("ocrButton").addEventListener("click", async () => {
            if (!selectedFile) {
                return;
            }

            const output = document.getElementById("output");
            output.textContent = "กำลังประมวลผลด้วย Typhoon OCR...\nกรุณารอสักครู่...";

            const formData = new FormData();
            formData.append("image", selectedFile);

            try {
                const res = await fetch("/ocr", {
                    method: "POST",
                    body: formData
                });

                const data = await res.json();
                if (!res.ok || data.error) {
                    output.textContent = "Error: " + (data.error || "OCR request failed");
                    return;
                }

                const text = data.results?.[0]?.message?.choices?.[0]?.message?.content;
                output.textContent = text || "ไม่พบข้อความในภาพ";
            } catch (err) {
                output.textContent = "Error: " + err.message;
            }
        });
    </script>
</body>
</html>
