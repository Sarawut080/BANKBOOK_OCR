<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typhoon OCR Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Noto+Sans+Thai:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #070a11;
            --bg-soft: #101725;
            --panel: rgba(18, 26, 42, 0.86);
            --panel-border: rgba(127, 156, 255, 0.22);
            --text: #e8eefb;
            --muted: #95a3bf;
            --accent: #58d3ff;
            --accent-2: #6cf8bf;
            --danger: #ff6a8e;
            --shadow: 0 18px 45px rgba(2, 8, 21, 0.45);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Noto Sans Thai", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 85% 15%, rgba(88, 211, 255, 0.2), transparent 28%),
                radial-gradient(circle at 12% 88%, rgba(108, 248, 191, 0.15), transparent 35%),
                linear-gradient(160deg, var(--bg) 0%, #0b1220 45%, #060a12 100%);
            padding: 28px 16px 22px;
        }

        .frame {
            max-width: 1240px;
            margin: 0 auto;
            animation: fadeIn 0.65s ease;
        }

        .hero {
            margin-bottom: 20px;
            display: flex;
            align-items: end;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }

        .title {
            font-family: "Chakra Petch", sans-serif;
            font-size: clamp(1.5rem, 2.2vw, 2.2rem);
            margin: 0;
            letter-spacing: 0.02em;
            text-shadow: 0 0 20px rgba(88, 211, 255, 0.2);
        }

        .subtitle {
            margin: 6px 0 0;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .badge-live {
            border: 1px solid rgba(108, 248, 191, 0.45);
            color: #b9ffd8;
            background: rgba(60, 184, 131, 0.12);
            border-radius: 999px;
            padding: 8px 14px;
            font-family: "Chakra Petch", sans-serif;
            font-size: 0.8rem;
            letter-spacing: 0.08em;
        }

        .grid {
            display: grid;
            gap: 18px;
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .panel {
            background: linear-gradient(180deg, rgba(23, 34, 54, 0.92), var(--panel));
            border: 1px solid var(--panel-border);
            border-radius: 18px;
            box-shadow: var(--shadow);
            padding: 18px;
            min-height: 70vh;
            display: flex;
            flex-direction: column;
        }

        .panel-head {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            align-items: center;
            margin-bottom: 14px;
        }

        .panel-title {
            margin: 0;
            font-family: "Chakra Petch", sans-serif;
            letter-spacing: 0.03em;
            font-size: 1.06rem;
        }

        .hint {
            color: var(--muted);
            font-size: 0.8rem;
        }

        .file-field {
            border: 1px dashed rgba(88, 211, 255, 0.5);
            border-radius: 14px;
            background: rgba(12, 18, 30, 0.6);
            padding: 14px;
        }

        input[type="file"] {
            width: 100%;
            color: var(--muted);
            font-family: "Noto Sans Thai", sans-serif;
            font-size: 0.93rem;
        }

        input[type="file"]::file-selector-button {
            border: 0;
            margin-right: 10px;
            background: linear-gradient(135deg, #1b2842, #2f4970);
            color: #dce7ff;
            border-radius: 10px;
            padding: 10px 12px;
            cursor: pointer;
        }

        .primary-btn {
            margin-top: 14px;
            border: 0;
            border-radius: 12px;
            padding: 11px 14px;
            color: #07101f;
            font-family: "Chakra Petch", sans-serif;
            font-weight: 700;
            letter-spacing: 0.04em;
            cursor: pointer;
            background: linear-gradient(120deg, var(--accent), var(--accent-2));
            transition: transform 0.2s ease, filter 0.2s ease;
        }

        .primary-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            filter: brightness(1.06);
        }

        .primary-btn:disabled {
            cursor: not-allowed;
            opacity: 0.45;
            filter: grayscale(0.2);
        }

        #preview {
            width: 100%;
            border-radius: 14px;
            margin-top: 16px;
            display: none;
            border: 1px solid rgba(128, 152, 194, 0.35);
            box-shadow: 0 12px 24px rgba(4, 11, 24, 0.5);
        }

        #output {
            margin: 0;
            white-space: pre-wrap;
            line-height: 1.65;
            font-size: 0.95rem;
            color: #eaf3ff;
            border-radius: 14px;
            border: 1px solid rgba(127, 156, 255, 0.22);
            background: rgba(10, 15, 26, 0.7);
            padding: 14px;
            min-height: 56vh;
            overflow-y: auto;
        }

        .progress-wrap {
            margin-bottom: 10px;
            border: 1px solid rgba(127, 156, 255, 0.22);
            border-radius: 12px;
            padding: 10px 12px;
            background: rgba(10, 15, 26, 0.7);
        }

        .progress-wrap.hidden {
            display: none;
        }

        .progress-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-family: "Chakra Petch", sans-serif;
            font-size: 0.82rem;
            color: var(--muted);
        }

        .progress-track {
            width: 100%;
            height: 8px;
            border-radius: 999px;
            overflow: hidden;
            background: rgba(121, 149, 214, 0.2);
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            border-radius: 999px;
            background: linear-gradient(120deg, var(--accent), var(--accent-2));
            transition: width 0.2s ease;
        }

        .error {
            color: var(--danger);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 992px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .panel {
                min-height: auto;
            }

            #output {
                min-height: 42vh;
            }
        }
    </style>
</head>
<body>
    <main class="frame">
        <header class="hero">
            <div>
                <h1 class="title">Typhoon OCR Studio</h1>
                <p class="subtitle">Upload an image and get clean OCR text instantly.</p>
            </div>
            <div class="badge-live">DARK INTERFACE</div>
        </header>

        <section class="grid">
            <article class="panel">
                <div class="panel-head">
                    <h2 class="panel-title">Upload Image</h2>
                    <span class="hint">JPG, PNG, WEBP</span>
                </div>
                <div class="file-field">
                    <input type="file" id="imageInput" accept="image/*">
                    <button id="ocrButton" class="primary-btn" disabled>Start OCR</button>
                </div>
                <img id="preview" alt="Preview Image">
            </article>

            <article class="panel">
                <div class="panel-head">
                    <h2 class="panel-title">Text Output</h2>
                    <span class="hint">Formatted Result</span>
                </div>
                <div id="progressWrap" class="progress-wrap hidden">
                    <div class="progress-meta">
                        <span id="progressPercent">0%</span>
                        <span id="etaText">Preparing...</span>
                    </div>
                    <div class="progress-track">
                        <div id="progressFill" class="progress-fill"></div>
                    </div>
                </div>
                <pre id="output">Waiting for image upload...</pre>
            </article>
        </section>
    </main>

    <script>
        let selectedFile = null;
        let progressTimer = null;
        let progressStart = 0;
        const OCR_TIME_KEY = "ocr_avg_ms";
        const OCR_DEFAULT_MS = 30000;

        function getEstimatedMs() {
            const saved = Number(localStorage.getItem(OCR_TIME_KEY));
            if (Number.isFinite(saved) && saved > 0) {
                return saved;
            }
            return OCR_DEFAULT_MS;
        }

        function rememberDuration(actualMs) {
            const current = getEstimatedMs();
            const next = Math.round(current * 0.7 + actualMs * 0.3);
            localStorage.setItem(OCR_TIME_KEY, String(next));
        }

        function formatEta(ms) {
            const totalSec = Math.max(0, Math.ceil(ms / 1000));
            const min = Math.floor(totalSec / 60);
            const sec = totalSec % 60;
            if (min > 0) {
                return `${min}m ${sec}s`;
            }
            return `${sec}s`;
        }

        function startProgress() {
            const progressWrap = document.getElementById("progressWrap");
            const progressFill = document.getElementById("progressFill");
            const progressPercent = document.getElementById("progressPercent");
            const etaText = document.getElementById("etaText");
            const estimatedMs = getEstimatedMs();

            progressWrap.classList.remove("hidden");
            progressStart = performance.now();
            progressFill.style.width = "0%";
            progressPercent.textContent = "0%";
            etaText.textContent = `ETA ${formatEta(estimatedMs)}`;

            progressTimer = setInterval(() => {
                const elapsed = performance.now() - progressStart;
                const pct = Math.min(95, (elapsed / estimatedMs) * 100);
                const remaining = Math.max(0, estimatedMs - elapsed);
                progressFill.style.width = `${pct.toFixed(0)}%`;
                progressPercent.textContent = `${pct.toFixed(0)}%`;
                etaText.textContent = `ETA ${formatEta(remaining)}`;
            }, 250);
        }

        function stopProgress(success) {
            const progressWrap = document.getElementById("progressWrap");
            const progressFill = document.getElementById("progressFill");
            const progressPercent = document.getElementById("progressPercent");
            const etaText = document.getElementById("etaText");

            if (progressTimer) {
                clearInterval(progressTimer);
                progressTimer = null;
            }

            if (success) {
                progressFill.style.width = "100%";
                progressPercent.textContent = "100%";
                etaText.textContent = "Completed";
                setTimeout(() => {
                    progressWrap.classList.add("hidden");
                }, 700);
            } else {
                etaText.textContent = "Failed";
                progressWrap.classList.add("hidden");
            }
        }

        document.getElementById("imageInput").addEventListener("change", (e) => {
            selectedFile = e.target.files[0];
            if (!selectedFile) {
                return;
            }

            const preview = document.getElementById("preview");
            preview.src = URL.createObjectURL(selectedFile);
            preview.style.display = "block";

            document.getElementById("output").textContent =
                "Image loaded. Click 'Start OCR' to continue.";
            document.getElementById("ocrButton").disabled = false;
        });

        document.getElementById("ocrButton").addEventListener("click", async () => {
            if (!selectedFile) {
                return;
            }

            const output = document.getElementById("output");
            output.classList.remove("error");
            output.textContent = "Processing with Typhoon OCR...\nPlease wait...";
            startProgress();
            const startedAt = performance.now();

            const formData = new FormData();
            formData.append("image", selectedFile);

            try {
                const res = await fetch("/ocr", {
                    method: "POST",
                    body: formData
                });

                const data = await res.json();
                if (!res.ok || data.error) {
                    stopProgress(false);
                    output.classList.add("error");
                    output.textContent = "Error: " + (data.error || "OCR request failed");
                    return;
                }

                const text =
                    data.formatted_text ||
                    data.results?.[0]?.message?.choices?.[0]?.message?.content;
                output.textContent = text || "No text was detected in this image.";
                rememberDuration(performance.now() - startedAt);
                stopProgress(true);
            } catch (err) {
                stopProgress(false);
                output.classList.add("error");
                output.textContent = "Error: " + err.message;
            }
        });
    </script>
</body>
</html>
